name: conventional-commits

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
  push:
    branches:
      - main
      - feat/**
      - fix/**
      - docs/**
      - chore/**
      - build/**
      - ci/**
      - refactor/**
      - perf/**
      - test/**

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: conventional-commits-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: pull-request-title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm install
      - name: Validate squash-merge title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pr_title="$PR_TITLE"
          if [[ "$pr_title" =~ ^\"(.*)\"$ ]]; then
            pr_title="${BASH_REMATCH[1]}"
          elif [[ "$pr_title" =~ ^\'(.*)\'$ ]]; then
            pr_title="${BASH_REMATCH[1]}"
          fi
          printf '%s\n' "$pr_title" | npx --no-install commitlint --verbose

  commit-range:
    name: commit-message-range
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm install
      - name: Validate pull request commits
        if: github.event_name == 'pull_request'
        env:
          COMMITLINT_FROM: ${{ github.event.pull_request.base.sha }}
          COMMITLINT_TO: ${{ github.event.pull_request.head.sha }}
        run: npm run lint:commits
      - name: Validate pushed commits
        if: github.event_name == 'push'
        env:
          COMMITLINT_FROM: ${{ github.event.before }}
          COMMITLINT_TO: ${{ github.sha }}
        run: npm run lint:commits
